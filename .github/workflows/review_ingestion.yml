name: Review Ingestion And Pulse

# One run at a time so overlapping schedule + manual/API triggers do not clash.
concurrency:
  group: review-ingestion-pulse
  cancel-in-progress: false

on:
  schedule:
    # Monday 02:00 UTC (= 07:30 IST). Uses MON so weekday is unambiguous in GitHub cron.
    - cron: "0 2 * * MON"
  workflow_dispatch:
  # Same job graph as schedule; use when `schedule` is disabled (e.g. some forks until Actions are fully enabled).
  # POST /repos/{owner}/{repo}/dispatches with {"event_type":"review-ingestion-weekly"} and a PAT with repo access.
  repository_dispatch:
    types: [review-ingestion-weekly]

jobs:
  review-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_PLAY_PACKAGE_NAME: com.nextbillion.groww
      GOOGLE_PLAY_REVIEW_MAX_PAGES: "40"
      GOOGLE_PLAY_REVIEW_THROTTLE: "8"
      REVIEW_INGESTION_WINDOW_WEEKS: "12"
      REVIEW_INGESTION_RECURRING_WINDOW_WEEKS: "1"
      REVIEW_INGESTION_FORCE_BACKFILL: "false"
      REVIEW_INGESTION_PRUNE_OLD_REVIEWS: "true"
      SUPABASE_URL: ${{ secrets.GH_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GH_SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GH_GEMINI_API_KEY }}
      GEMINI_GENERATION_MODEL: gemini-2.5-flash
      GEMINI_EMBEDDING_MODEL: gemini-embedding-001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Ingest Google Play reviews
        run: npm run phase2:ingest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install clustering dependencies
        run: python3 -m pip install -r scripts/requirements-clustering.txt

      - name: Generate Review Pulse
        run: npm run phase2:cluster

      - name: Upload Review Pulse JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-pulse-latest
          path: artifacts/review-pulse-latest.json
          if-no-files-found: warn
